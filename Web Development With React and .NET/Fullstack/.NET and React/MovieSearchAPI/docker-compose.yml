services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: movie-search-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -Q \"SELECT 1\" -C || exit 1"
        ]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 25s

  backend:
    build:
      context: ./Backend
    container_name: movie-search-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=db;Database=MovieSearchDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False;
      Omdb__ApiKey: ${OMDB_API_KEY}
      Omdb__BaseUrl: https://www.omdbapi.com/
    ports:
      - "5202:8080"

  frontend:
    build:
      context: ./Frontend
    container_name: movie-search-frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:80"

volumes:
  mssql-data:
